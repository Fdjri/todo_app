name: workaholic
description: "A coquette-themed to-do list app with playful aesthetics"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI Components (shadcn)
  shadcn_flutter: ^0.0.52

  # State Management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Local Storage
  shared_preferences: ^2.3.0

  # Dependency Injection
  get_it: ^8.0.0

  # Notifications
  flutter_local_notifications: ^18.0.0
  android_alarm_manager_plus: ^4.0.0
  timezone: ^0.10.0
  permission_handler: ^11.0.0

  # Vibration (for alarm)
  vibration: ^2.0.0

  # Animations (Lottie)
  lottie: ^3.3.1

  # Sound Effects
  audioplayers: ^6.1.0

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Utilities
  uuid: ^4.0.0
  intl: ^0.20.2

  # Fonts
  google_fonts: ^6.2.0

  # Home Screen Widget
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/sounds/
    - assets/images/
